query GetIndexDTF($id: ID!, $block: Block_height) {
  dtf(id: $id, block: $block) {
    id
    proxyAdmin
    timestamp
    deployer
    ownerAddress
    admins
    mintingFee
    tvlFee
    annualizedTvlFee
    mandate
    auctionDelay
    auctionLength
    auctionApprovers
    auctionLaunchers
    brandManagers
    totalRevenue
    protocolRevenue
    governanceRevenue
    externalRevenue
    feeRecipients
    bidsEnabled
    trustedFillerRegistry
    trustedFillerEnabled
    weightControl
    priceControl
    ownerGovernance {
      id
      name
      version
      votingDelay
      votingPeriod
      proposalThreshold
      quorumVotes
      quorumNumerator
      quorumDenominator
      isOptimistic
      optimisticVetoDelay
      optimisticVetoPeriod
      optimisticVetoThreshold
      optimisticProposalThrottleCapacity
      optimisticSelectorRegistry
      optimisticProposers
      timelock {
        id
        guardians
        optimisticProposers
        executionDelay
        type
      }
    }
    legacyAdmins
    tradingGovernance {
      id
      name
      version
      votingDelay
      votingPeriod
      proposalThreshold
      quorumVotes
      quorumNumerator
      quorumDenominator
      isOptimistic
      optimisticVetoDelay
      optimisticVetoPeriod
      optimisticVetoThreshold
      optimisticProposalThrottleCapacity
      optimisticSelectorRegistry
      optimisticProposers
      timelock {
        id
        guardians
        optimisticProposers
        executionDelay
        type
      }
    }
    legacyAuctionApprovers
    token {
      id
      address
      name
      symbol
      decimals
      totalSupply
      currentHolderCount
      cumulativeHolderCount
      transferCount
      mintCount
      burnCount
      totalBurned
      totalMinted
    }
    stToken {
      id
      token {
        id
        address
        name
        symbol
        decimals
        totalSupply
        currentHolderCount
        cumulativeHolderCount
        transferCount
        mintCount
        burnCount
        totalBurned
        totalMinted
      }
      currentDelegates
      totalDelegates
      delegatedVotesRaw
      currentOptimisticDelegates
      totalOptimisticDelegates
      optimisticDelegatedVotesRaw
      underlying {
        name
        symbol
        address
        decimals
      }
      governance {
        id
        name
        version
        votingDelay
        votingPeriod
        proposalThreshold
        quorumVotes
        quorumNumerator
        quorumDenominator
        isOptimistic
        optimisticVetoDelay
        optimisticVetoPeriod
        optimisticVetoThreshold
        optimisticProposalThrottleCapacity
        optimisticSelectorRegistry
        optimisticProposers
        timelock {
          id
          guardians
          optimisticProposers
          executionDelay
          type
        }
      }
      legacyGovernance
      rewards(where: { active: true }) {
        rewardToken {
          address
          name
          symbol
          decimals
        }
      }
    }
  }
}

query GetIndexDtfProposals($governanceIds: [ID!]!, $limit: Int = 100) {
  governances(where: { id_in: $governanceIds }) {
    id
    proposals(first: $limit, orderBy: creationTime, orderDirection: desc) {
      id
      description
      creationTime
      state
      isOptimistic
      vetoThreshold
      vetoThresholdVotes
      optimisticSnapshot
      optimisticSnapshotSupply
      forWeightedVotes
      abstainWeightedVotes
      againstWeightedVotes
      executionETA
      executionTime
      quorumVotes
      voteStart
      voteEnd
      executionBlock
      creationBlock
      proposer {
        address
      }
      governance {
        id
        token {
          id
        }
        timelock {
          id
        }
      }
    }
    proposalCount
  }
}

query GetAllIndexDtfProposals($limit: Int = 100, $offset: Int = 0, $where: Proposal_filter) {
  proposals(first: $limit, skip: $offset, orderBy: creationTime, orderDirection: desc, where: $where) {
    id
    description
    creationTime
    state
    isOptimistic
    vetoThreshold
    vetoThresholdVotes
    optimisticSnapshot
    optimisticSnapshotSupply
    forWeightedVotes
    abstainWeightedVotes
    againstWeightedVotes
    executionETA
    executionTime
    quorumVotes
    voteStart
    voteEnd
    executionBlock
    creationBlock
    proposer {
      address
    }
    governance {
      id
      token {
        id
      }
      timelock {
        id
      }
    }
  }
}

query GetIndexDtfProposalGovernanceAddresses($dtfId: ID!) {
  dtf(id: $dtfId) {
    ownerGovernance {
      id
    }
    tradingGovernance {
      id
    }
    legacyAdmins
    legacyAuctionApprovers
    stToken {
      governance {
        id
      }
      legacyGovernance
    }
  }
}

fragment IndexDtfProposalContractContext on DTF {
  id
  proxyAdmin
  legacyAdmins
  legacyAuctionApprovers
  ownerGovernance {
    id
    optimisticSelectorRegistry
    timelock {
      id
    }
  }
  tradingGovernance {
    id
    optimisticSelectorRegistry
    timelock {
      id
    }
  }
  stToken {
    id
    legacyGovernance
    governance {
      id
      optimisticSelectorRegistry
      timelock {
        id
      }
    }
  }
}

query GetIndexDtfProposal($proposalId: ID!, $dtfId: ID!) {
  dtf(id: $dtfId) {
    ...IndexDtfProposalContractContext
  }
  proposal(id: $proposalId) {
    id
    timelockId
    description
    creationTime
    voteStart
    voteEnd
    queueBlock
    queueTime
    state
    isOptimistic
    vetoThreshold
    vetoThresholdVotes
    optimisticSnapshot
    optimisticSnapshotSupply
    executionETA
    executionTime
    executionBlock
    creationBlock
    cancellationTime
    calldatas
    targets
    proposer {
      address
    }
    votes {
      choice
      voter {
        address
      }
      weight
    }
    forWeightedVotes
    againstWeightedVotes
    abstainWeightedVotes
    quorumVotes
    forDelegateVotes
    abstainDelegateVotes
    againstDelegateVotes
    executionTxnHash
    governance {
      id
      optimisticSelectorRegistry
      token {
        id
      }
      timelock {
        id
        type
      }
    }
  }
}

query GetIndexDtfProposalVotingSnapshot($proposalId: ID!) {
  proposal(id: $proposalId) {
    id
    state
    isOptimistic
    vetoThreshold
    vetoThresholdVotes
    optimisticSnapshot
    optimisticSnapshotSupply
    voteStart
    voteEnd
    forWeightedVotes
    againstWeightedVotes
    abstainWeightedVotes
    quorumVotes
    governance {
      id
      token {
        id
      }
    }
    votes {
      choice
      voter {
        address
      }
      weight
    }
  }
}

query GetIndexDtfDelegates($stToken: ID!, $limit: Int = 10) {
  stakingToken(id: $stToken) {
    id
    totalDelegates
    currentDelegates
    totalOptimisticDelegates
    currentOptimisticDelegates
    token {
      totalSupply
    }
    delegates(
      first: $limit
      orderBy: delegatedVotes
      orderDirection: desc
      where: {
        or: [
          { address_not: "0x0000000000000000000000000000000000000000", delegatedVotesRaw_gt: "0" }
          { address_not: "0x0000000000000000000000000000000000000000", optimisticDelegatedVotesRaw_gt: "0" }
        ]
      }
    ) {
      address
      delegatedVotesRaw
      optimisticDelegatedVotesRaw
      numberVotes
      numberOptimisticVotes
      hasBeenStandardDelegate
      hasBeenOptimisticDelegate
      tokenHoldersRepresentedAmount
      optimisticTokenHoldersRepresentedAmount
    }
  }
}

query GetIndexDtfRebalances($dtf: String!, $limit: Int = 100, $offset: Int = 0) {
  rebalances(where: { dtf: $dtf }, orderBy: timestamp, orderDirection: desc, first: $limit, skip: $offset) {
    id
    nonce
    tokens {
      address
      name
      symbol
      decimals
    }
    priceControl
    weightLowLimit
    weightSpotLimit
    weightHighLimit
    rebalanceLowLimit
    rebalanceSpotLimit
    rebalanceHighLimit
    priceLowLimit
    priceHighLimit
    restrictedUntil
    availableUntil
    transactionHash
    blockNumber
    timestamp
  }
}

query GetIndexDtfRebalance($id: ID!) {
  rebalance(id: $id) {
    id
    nonce
    tokens {
      address
      name
      symbol
      decimals
    }
    priceControl
    weightLowLimit
    weightSpotLimit
    weightHighLimit
    rebalanceLowLimit
    rebalanceSpotLimit
    rebalanceHighLimit
    priceLowLimit
    priceHighLimit
    restrictedUntil
    availableUntil
    transactionHash
    blockNumber
    timestamp
  }
}

query GetIndexDtfRebalanceByNonce($dtf: String!, $nonce: BigInt!) {
  rebalances(where: { dtf: $dtf, nonce: $nonce }, first: 1) {
    id
    nonce
    tokens {
      address
      name
      symbol
      decimals
    }
    priceControl
    weightLowLimit
    weightSpotLimit
    weightHighLimit
    rebalanceLowLimit
    rebalanceSpotLimit
    rebalanceHighLimit
    priceLowLimit
    priceHighLimit
    restrictedUntil
    availableUntil
    transactionHash
    blockNumber
    timestamp
  }
}

query GetIndexDtfTransactions($dtf: String!, $limit: Int = 50, $offset: Int = 0) {
  transferEvents(
    where: { token: $dtf, type_not: "TRANSFER" }
    orderBy: timestamp
    orderDirection: desc
    first: $limit
    skip: $offset
  ) {
    id
    hash
    amount
    timestamp
    to {
      id
    }
    from {
      id
    }
    type
  }
}

query GetIndexDtfRebalanceAuctions($rebalanceId: String!) {
  auctions(where: { rebalance: $rebalanceId }) {
    id
    tokens {
      address
      name
      symbol
      decimals
    }
    weightLowLimit
    weightSpotLimit
    weightHighLimit
    rebalanceLowLimit
    rebalanceSpotLimit
    rebalanceHighLimit
    priceLowLimit
    priceHighLimit
    startTime
    endTime
    blockNumber
    timestamp
    transactionHash
    bids {
      id
      bidder
      sellToken {
        address
        name
        symbol
        decimals
      }
      buyToken {
        address
        name
        symbol
        decimals
      }
      sellAmount
      buyAmount
      blockNumber
      timestamp
      transactionHash
    }
  }
}

overwrite: true
ignoreNoDocuments: true

generates:
  src/index-dtf/dtf/subgraph/dtf.generated.ts:
    schema: https://api.goldsky.com/api/public/project_cmgzim3e100095np2gjnbh6ry/subgraphs/dtf-index-base/prod/gn
    documents:
      - src/index-dtf/dtf/subgraph/**/*.graphql
    plugins:
      - add:
          content: |
            type Maybe<T> = T | null;
            type InputMaybe<T> = Maybe<T>;
            type Exact<T extends { [key: string]: unknown }> = { [K in keyof T]: T[K] };
            type Scalars = {
              ID: { input: string; output: string };
              String: { input: string; output: string };
              Boolean: { input: boolean; output: boolean };
              Int: { input: number; output: number };
              Float: { input: number; output: number };
              BigDecimal: { input: string; output: string };
              BigInt: { input: string; output: string };
              Bytes: { input: string; output: string };
              Int8: { input: string; output: string };
              Timestamp: { input: string; output: string };
            };
            type Block_Height = {
              hash?: InputMaybe<Scalars['Bytes']['input']>;
              number?: InputMaybe<Scalars['Int']['input']>;
              number_gte?: InputMaybe<Scalars['Int']['input']>;
            };
      - typescript-operations
      - typed-document-node
    config:
      documentMode: string
      emitLegacyCommonJSImports: false
      importExtension: .js
      onlyOperationTypes: true
      preResolveTypes: true
      scalars:
        BigDecimal: string
        BigInt: string
        Bytes: string
        Int8: string
        Timestamp: string
      skipTypename: true
      useTypeImports: true

overwrite: true
ignoreNoDocuments: true

generates:
  src/graphql/index/generated/:
    schema: https://api.goldsky.com/api/public/project_cmgzim3e100095np2gjnbh6ry/subgraphs/dtf-index-base/prod/gn
    documents:
      - src/graphql/index/**/*.graphql
    preset: client
    presetConfig:
      fragmentMasking: false
    config:
      emitLegacyCommonJSImports: false
      importExtension: .js
      useTypeImports: true

  src/graphql/yield/generated/:
    schema: https://api.goldsky.com/api/public/project_cmgzim3e100095np2gjnbh6ry/subgraphs/dtf-yield-base/4.2.0-v2/gn
    documents:
      - src/graphql/yield/**/*.graphql
    preset: client
    presetConfig:
      fragmentMasking: false
    config:
      emitLegacyCommonJSImports: false
      importExtension: .js
      useTypeImports: true
